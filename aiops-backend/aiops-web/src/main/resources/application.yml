spring:
  application:
    name: aiops-backend
  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:3306}/${SPRING_DATASOURCE_DATABASE:aiops}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 3s
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:aiops;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

aiops:
  cache:
    maximum-size: 1000
    expire-after-seconds: 600
    redis:
      enabled: ${AIOPS_CACHE_REDIS_ENABLED:true}
      key-prefix: "aiops:"
  llm:
    open-ai-enabled: false
    anthropic-enabled: false
    ollama-enabled: true
  command:
    allowed:
      - restart_service
      - get_logs
      - clear_cache
      - scale_deployment
    forbidden:
      - rm -rf
      - shutdown
      - init 6
  security:
    seed: ${AIOPS_BOOTSTRAP_TOKEN:aiops-mvp-seed}
  tunnel:
    enabled: false
    command: ${AIOPS_TUNNEL_COMMAND:cloudflared}
    arguments: ${AIOPS_TUNNEL_ARGUMENTS:tunnel --url http://127.0.0.1:8080}
    allow-non-local-url: false
