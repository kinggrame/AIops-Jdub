spring:
  application:
    name: aiops-backend
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

aiops:
  security:
    seed: ${AIOPS_AGENT_SEED:aiops-mvp-seed}
  cache:
    maximum-size: 1000
    expire-after-seconds: 600
    redis:
      enabled: ${AIOPS_CACHE_REDIS_ENABLED:true}
      key-prefix: "aiops:"
  llm:
    open-ai-enabled: false
    anthropic-enabled: false
    ollama-enabled: true
  command:
    allowed:
      - restart_service
      - get_logs
      - clear_cache
      - scale_deployment
    forbidden:
      - rm -rf
      - shutdown
      - init 6
