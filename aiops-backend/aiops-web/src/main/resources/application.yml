spring:
  application:
    name: aiops-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

aiops:
  security:
    seed: ${AIOPS_AGENT_SEED:aiops-mvp-seed}
  cache:
    maximum-size: 1000
    expire-after-seconds: 600
  llm:
    open-ai-enabled: false
    anthropic-enabled: false
    ollama-enabled: true
  command:
    allowed:
      - restart_service
      - get_logs
      - clear_cache
      - scale_deployment
    forbidden:
      - rm -rf
      - shutdown
      - init 6
