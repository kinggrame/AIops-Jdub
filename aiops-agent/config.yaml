server:
  url: "${AIOPS_SERVER_URL:http://localhost:8080}"
  bootstrap_token: "${AIOPS_BOOTSTRAP_TOKEN}"
  pairing_token: "${AIOPS_PAIRING_TOKEN}"
  host: "server-001"
  ip: "127.0.0.1"
  trusted_servers:
    - "localhost:8080"

webui:
  enable: true
  port: 8089

collection:
  interval: 15

triggers:
  - name: cpu_high
    metric: cpu.usage
    operator: ">"
    value: 90
    target: ai

  - name: memory_high
    metric: memory.usage
    operator: ">"
    value: 85
    target: ai

commands:
  allowed:
    - top
    - ps aux
    - journalctl -u nginx -n 200
    - tail -n 200 /var/log/nginx/error.log

logwatch:
  files:
    - /var/log/syslog
    - /var/log/nginx/error.log
  keywords:
    - error
    - panic
    - oom

security:
  approval_required: true
  trusted_servers:
    - "localhost:8080"
